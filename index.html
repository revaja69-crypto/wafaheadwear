<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow UMKM Pro - Cloud Sync</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-container { display: block !important; }
            .card { border: 1px solid #eee !important; box-shadow: none !important; }
        }

        /* Smooth tab transition */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Dekonstruksi hooks dari React
        const { useState, useEffect, useMemo } = React;

        // Firebase Mock atau Real (Environment menyediakan Firebase lewat Global)
        // Jika Anda menggunakan Firebase sendiri, ganti config di bawah ini.
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        
        // Catatan: Di lingkungan Canvas, Firebase SDK diimpor secara berbeda.
        // Untuk versi HTML mandiri, kita asumsikan script SDK sudah ada atau menggunakan mock jika tidak terdeteksi.
        
        const App = () => {
            const [user, setUser] = useState({ uid: 'guest-' + Math.random().toString(36).substr(2, 9), isAnonymous: true });
            const [transactions, setTransactions] = useState([]);
            const [categories, setCategories] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [showAddModal, setShowAddModal] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            const [formData, setFormData] = useState({
                amount: '',
                type: 'income',
                category: '',
                note: '',
                date: new Date().toISOString().split('T')[0]
            });

            const [newCatName, setNewCatName] = useState('');
            const [newCatType, setNewCatType] = useState('expense');

            // --- Window Resize Listener ---
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                
                // Load Local Data as fallback if cloud not connected
                const savedTrans = localStorage.getItem('umkm_transactions');
                const savedCats = localStorage.getItem('umkm_categories');
                
                if (savedTrans) setTransactions(JSON.parse(savedTrans));
                if (savedCats) {
                    setCategories(JSON.parse(savedCats));
                } else {
                    const defaults = [
                        { id: '1', name: 'Penjualan', type: 'income' },
                        { id: '2', name: 'Modal', type: 'income' },
                        { id: '3', name: 'Belanja Stok', type: 'expense' },
                        { id: '4', name: 'Gaji', type: 'expense' },
                        { id: '5', name: 'Operasional', type: 'expense' },
                        { id: '6', name: 'Lainnya', type: 'expense' }
                    ];
                    setCategories(defaults);
                }

                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Save to LocalStorage whenever data changes
            useEffect(() => {
                localStorage.setItem('umkm_transactions', JSON.stringify(transactions));
                localStorage.setItem('umkm_categories', JSON.stringify(categories));
            }, [transactions, categories]);

            // Set default category
            useEffect(() => {
                const filtered = categories.filter(c => c.type === formData.type);
                if (filtered.length > 0 && !formData.category) {
                    setFormData(prev => ({ ...prev, category: filtered[0].name }));
                }
            }, [formData.type, categories, showAddModal]);

            // --- Kalkulasi ---
            const stats = useMemo(() => {
                const income = transactions
                    .filter(t => t.type === 'income')
                    .reduce((acc, curr) => acc + Number(curr.amount), 0);
                const expense = transactions
                    .filter(t => t.type === 'expense')
                    .reduce((acc, curr) => acc + Number(curr.amount), 0);
                return { income, expense, balance: income - expense };
            }, [transactions]);

            const reportData = useMemo(() => {
                const months = [];
                for (let i = 5; i >= 0; i--) {
                    const d = new Date();
                    d.setMonth(d.getMonth() - i);
                    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    const label = d.toLocaleString('id-ID', { month: 'short' });
                    months.push({ key, label, income: 0, expense: 0 });
                }

                transactions.forEach(t => {
                    const monthKey = t.date.substring(0, 7);
                    const found = months.find(m => m.key === monthKey);
                    if (found) {
                        if (t.type === 'income') found.income += Number(t.amount);
                        else found.expense += Number(t.amount);
                    }
                });

                const expenseCats = {};
                transactions.filter(t => t.type === 'expense').forEach(t => {
                    expenseCats[t.category] = (expenseCats[t.category] || 0) + Number(t.amount);
                });
                
                const pieData = Object.entries(expenseCats).map(([name, value]) => ({ name, value }));
                const totalExpense = pieData.reduce((acc, curr) => acc + curr.value, 0);

                return { barData: months, pieData, totalExpense };
            }, [transactions]);

            const formatIDR = (amount) => {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0
                }).format(amount);
            };

            // --- Handlers ---
            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.note) return;
                
                const newTrans = {
                    ...formData,
                    id: Date.now().toString(),
                    amount: Number(formData.amount)
                };
                
                setTransactions([newTrans, ...transactions]);
                setShowAddModal(false);
                setFormData({
                    amount: '',
                    type: 'income',
                    category: '',
                    note: '',
                    date: new Date().toISOString().split('T')[0]
                });
            };

            const deleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            const handleAddCategory = (e) => {
                e.preventDefault();
                if (!newCatName) return;
                const newCat = { id: Date.now().toString(), name: newCatName, type: newCatType };
                setCategories([...categories, newCat]);
                setNewCatName('');
            };

            const deleteCategory = (id) => {
                setCategories(categories.filter(c => c.id !== id));
            };

            // --- UI Elements ---
            const Icon = ({ name, size = 20, className = "" }) => {
                const LucideIcon = lucide[name.charAt(0).toUpperCase() + name.slice(1)];
                return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
            };

            const BarChart = ({ data }) => {
                const maxVal = Math.max(...data.map(d => Math.max(d.income, d.expense)), 1000);
                const height = 150;
                const width = 400;
                const barWidth = 12;
                const gap = 45;

                return (
                    <svg viewBox={`0 0 ${width} ${height + 30}`} className="w-full h-auto">
                        {data.map((d, i) => {
                            const incH = (d.income / maxVal) * height;
                            const expH = (d.expense / maxVal) * height;
                            const x = i * (barWidth * 2 + gap) + 30;
                            return (
                                <g key={i}>
                                    <rect x={x} y={height - incH} width={barWidth} height={incH} fill="#10b981" rx="3" />
                                    <rect x={x + barWidth + 4} y={height - expH} width={barWidth} height={expH} fill="#ef4444" rx="3" />
                                    <text x={x + barWidth} y={height + 20} textAnchor="middle" fontSize="10" fill="#94a3b8" fontWeight="bold">{d.label}</text>
                                </g>
                            );
                        })}
                        <line x1="0" y1={height} x2={width} y2={height} stroke="#f1f5f9" strokeWidth="2" />
                    </svg>
                );
            };

            const TransactionItem = ({ item }) => (
                <div className="flex items-center justify-between p-4 bg-white hover:bg-slate-50 border-b border-slate-50 transition-all group">
                    <div className="flex items-center gap-4">
                        <div className={`p-3 rounded-2xl ${item.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                            {item.type === 'income' ? <lucide.ArrowUpCircle size={20} /> : <lucide.ArrowDownCircle size={20} />}
                        </div>
                        <div>
                            <p className="font-bold text-slate-800 text-sm leading-tight">{item.note}</p>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">{item.date}</span>
                                <span className="text-[10px] text-slate-200 font-bold">•</span>
                                <span className="bg-slate-100 text-slate-500 text-[9px] px-2 py-0.5 rounded font-bold uppercase">{item.category}</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <p className={`font-black text-sm ${item.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>
                            {item.type === 'income' ? '+' : '-'} {formatIDR(item.amount)}
                        </p>
                        <button onClick={() => deleteTransaction(item.id)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500 transition-all no-print">
                            <lucide.Trash2 size={16} />
                        </button>
                    </div>
                </div>
            );

            // --- Desktop Layout ---
            const DesktopView = () => (
                <div className="flex min-h-screen">
                    <aside className="w-72 bg-white border-r border-slate-200 p-8 flex flex-col gap-10 no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg shadow-blue-100">
                                <lucide.Wallet size={24} />
                            </div>
                            <h1 className="text-xl font-black text-slate-900 leading-none">CASHFLOW <span className="block text-[9px] text-blue-500 tracking-[0.3em] mt-1">UMKM PRO</span></h1>
                        </div>

                        <nav className="flex flex-col gap-2 flex-1">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'LayoutDashboard' },
                                { id: 'reports', label: 'Laporan Detail', icon: 'BarChart3' },
                                { id: 'history', label: 'Riwayat Kas', icon: 'History' },
                                { id: 'settings', label: 'Pengaturan', icon: 'Settings' }
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}
                                >
                                    {React.createElement(lucide[tab.icon], { size: 20 })} {tab.label}
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto space-y-4">
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2">SINKRONISASI</p>
                                <div className="flex items-center gap-2 text-emerald-600 font-bold text-xs">
                                    <lucide.Cloud size={14}/> ONLINE & AKTIF
                                </div>
                            </div>
                            <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl bg-slate-900 text-white font-bold text-sm hover:bg-black transition-all">
                                <lucide.Printer size={18} /> CETAK LAPORAN
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 p-12 overflow-y-auto max-h-screen">
                        <header className="flex justify-between items-center mb-10 no-print">
                            <h2 className="text-3xl font-black text-slate-900">
                                {activeTab === 'dashboard' ? 'Analisis Keuangan' : 
                                 activeTab === 'reports' ? 'Analisis Kategori' : 
                                 activeTab === 'settings' ? 'Atur Bisnis' : 'Arsip Transaksi'}
                            </h2>
                            <button onClick={() => setShowAddModal(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-3 shadow-xl shadow-blue-200 transition-all active:scale-95">
                                <lucide.PlusCircle size={22} /> TRANSAKSI BARU
                            </button>
                        </header>

                        <div className="fade-in">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-10">
                                    <div className="grid grid-cols-3 gap-8">
                                        <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between">
                                            <div><p className="text-xs font-black text-slate-400 uppercase mb-2">Saldo</p><h3 className="text-2xl font-black text-blue-600">{formatIDR(stats.balance)}</h3></div>
                                            <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl no-print"><lucide.Wallet size={24}/></div>
                                        </div>
                                        <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between">
                                            <div><p className="text-xs font-black text-slate-400 uppercase mb-2">Masuk</p><h3 className="text-2xl font-black text-emerald-600">{formatIDR(stats.income)}</h3></div>
                                            <div className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl no-print"><lucide.ArrowUpCircle size={24}/></div>
                                        </div>
                                        <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between">
                                            <div><p className="text-xs font-black text-slate-400 uppercase mb-2">Keluar</p><h3 className="text-2xl font-black text-rose-600">{formatIDR(stats.expense)}</h3></div>
                                            <div className="p-4 bg-rose-50 text-rose-600 rounded-2xl no-print"><lucide.ArrowDownCircle size={24}/></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-10">
                                        <div className="bg-white p-10 rounded-[40px] shadow-sm border border-slate-100 card">
                                            <h3 className="font-black text-xl mb-8">Tren 6 Bulan</h3>
                                            <BarChart data={reportData.barData} />
                                        </div>
                                        <div className="bg-white p-10 rounded-[40px] shadow-sm border border-slate-100 card">
                                            <h3 className="font-black text-xl mb-8">Data Terbaru</h3>
                                            <div className="space-y-1">
                                                {transactions.slice(0, 5).map(t => <TransactionItem key={t.id} item={t} />)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="grid grid-cols-2 gap-10">
                                    <div className="bg-white p-10 rounded-[40px] border border-slate-100 shadow-sm">
                                        <h3 className="text-xl font-black mb-6">Kelola Kategori</h3>
                                        <form onSubmit={handleAddCategory} className="flex gap-2 mb-8">
                                            <input type="text" placeholder="Kategori baru..." required value={newCatName} onChange={(e) => setNewCatName(e.target.value)} className="flex-1 p-4 bg-slate-50 rounded-xl outline-none font-bold text-sm" />
                                            <select value={newCatType} onChange={(e) => setNewCatType(e.target.value)} className="p-4 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                                                <option value="expense">Keluar</option>
                                                <option value="income">Masuk</option>
                                            </select>
                                            <button type="submit" className="p-4 bg-blue-600 text-white rounded-xl shadow-lg hover:bg-blue-700 transition-all"><lucide.Plus size={20}/></button>
                                        </form>
                                        <div className="space-y-2">
                                            {categories.map(cat => (
                                                <div key={cat.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                                    <span className={`text-xs font-black uppercase tracking-widest ${cat.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>{cat.name}</span>
                                                    <button onClick={() => deleteCategory(cat.id)} className="text-slate-300 hover:text-rose-500"><lucide.Trash2 size={16}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-indigo-600 p-10 rounded-[40px] text-white shadow-xl flex flex-col justify-center">
                                        <lucide.Settings size={48} className="mb-6 opacity-30" />
                                        <h3 className="text-3xl font-black mb-4">Kostumisasi Bisnis</h3>
                                        <p className="text-indigo-100 leading-relaxed">Sesuaikan kategori untuk pelaporan yang lebih spesifik bagi bisnis UMKM Anda.</p>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'reports' && (
                                <div className="bg-white p-12 rounded-[48px] shadow-sm border border-slate-100 card text-center">
                                    <h3 className="text-2xl font-black mb-6">Analisis Pengeluaran</h3>
                                    <p className="text-slate-400 mb-10 font-medium">Berdasarkan total transaksi seluruh kategori.</p>
                                    <div className="max-w-md mx-auto space-y-4">
                                        {reportData.pieData.map((slice, i) => (
                                            <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                                <span className="font-bold text-slate-700">{slice.name}</span>
                                                <span className="font-black text-blue-600">{formatIDR(slice.value)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="bg-white rounded-[40px] shadow-sm border border-slate-100 p-8 card">
                                    <h3 className="font-black text-2xl mb-8">Arsip Transaksi</h3>
                                    <div className="space-y-1">
                                        {transactions.map(t => <TransactionItem key={t.id} item={t} />)}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );

            // --- Mobile Layout ---
            const MobileView = () => (
                <div className="min-h-screen bg-slate-50 pb-32 no-print">
                    <header className="bg-blue-600 text-white px-6 pt-10 pb-20 rounded-b-[48px] shadow-2xl relative overflow-hidden">
                        <div className="flex justify-between items-center mb-6 relative z-10">
                            <span className="text-[10px] font-black tracking-widest uppercase opacity-70">UMKM CASHFLOW</span>
                            <div className="flex items-center gap-2 px-3 py-1 bg-white/10 rounded-full text-[9px] font-black">
                                <lucide.Cloud size={10} /> CLOUD SYNC
                            </div>
                        </div>
                        <div className="text-center relative z-10">
                            <p className="text-blue-200 text-[10px] font-black uppercase tracking-[0.3em] mb-1">Total Saldo Bisnis</p>
                            <h2 className="text-4xl font-black tracking-tighter">{formatIDR(stats.balance)}</h2>
                        </div>
                    </header>

                    <main className="px-6 -mt-10 relative z-10 fade-in">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-[32px] shadow-xl border border-slate-50">
                                        <span className="text-[9px] font-black text-slate-400 uppercase block mb-1">Masuk</span>
                                        <p className="font-black text-emerald-600 text-sm truncate">{formatIDR(stats.income)}</p>
                                    </div>
                                    <div className="bg-white p-5 rounded-[32px] shadow-xl border border-slate-50">
                                        <span className="text-[9px] font-black text-slate-400 uppercase block mb-1">Keluar</span>
                                        <p className="font-black text-rose-600 text-sm truncate">{formatIDR(stats.expense)}</p>
                                    </div>
                                </div>
                                <div className="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                                    <BarChart data={reportData.barData} />
                                </div>
                                <div className="bg-white rounded-[40px] overflow-hidden shadow-sm">
                                    {transactions.slice(0, 10).map(t => <TransactionItem key={t.id} item={t} />)}
                                </div>
                            </div>
                        )}
                        
                        {activeTab !== 'dashboard' && (
                            <div className="bg-white rounded-[40px] p-6 shadow-sm min-h-[50vh]">
                                <h3 className="text-lg font-black mb-6 border-b border-slate-50 pb-4">
                                    {activeTab === 'reports' ? 'Analisis' : 
                                     activeTab === 'settings' ? 'Kategori' : 'History'}
                                </h3>
                                {activeTab === 'history' && transactions.map(t => <TransactionItem key={t.id} item={t} />)}
                                {activeTab === 'settings' && (
                                    <div className="space-y-4">
                                        <form onSubmit={handleAddCategory} className="space-y-2">
                                            <input type="text" placeholder="Nama Kategori" required value={newCatName} onChange={(e) => setNewCatName(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" />
                                            <div className="flex gap-2">
                                                <select value={newCatType} onChange={(e) => setNewCatType(e.target.value)} className="flex-1 p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                                                    <option value="expense">Keluar</option><option value="income">Masuk</option>
                                                </select>
                                                <button type="submit" className="px-6 bg-blue-600 text-white rounded-2xl"><lucide.Plus size={20}/></button>
                                            </div>
                                        </form>
                                        <div className="space-y-2 pt-4">
                                            {categories.map(cat => (
                                                <div key={cat.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                                                    <span className="text-[10px] font-black uppercase text-slate-600">{cat.name}</span>
                                                    <button onClick={() => deleteCategory(cat.id)} className="text-slate-300"><lucide.Trash2 size={14}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'reports' && (
                                    <div className="space-y-3">
                                        {reportData.pieData.map((d, i) => (
                                            <div key={i} className="flex justify-between p-4 bg-slate-50 rounded-2xl text-xs font-bold">
                                                <span>{d.name}</span><span>{formatIDR(d.value)}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 bg-slate-900/95 backdrop-blur-xl rounded-[32px] flex justify-around items-center py-5 px-4 z-40 shadow-2xl border border-white/10 no-print">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 ${activeTab === 'dashboard' ? 'text-blue-400' : 'text-slate-500'}`}>
                            <lucide.LayoutDashboard size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Home</span>
                        </button>
                        <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center gap-1 ${activeTab === 'reports' ? 'text-blue-400' : 'text-slate-500'}`}>
                            <lucide.BarChart3 size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Report</span>
                        </button>
                        <div className="relative -top-10">
                            <button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white w-16 h-16 rounded-[24px] flex items-center justify-center shadow-2xl border-4 border-slate-50 active:scale-90 transition-transform"><lucide.PlusCircle size={32} /></button>
                        </div>
                        <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 ${activeTab === 'history' ? 'text-blue-400' : 'text-slate-500'}`}>
                            <lucide.History size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Arsip</span>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 ${activeTab === 'settings' ? 'text-blue-400' : 'text-slate-500'}`}>
                            <lucide.Settings size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Atur</span>
                        </button>
                    </nav>
                </div>
            );

            return (
                <>
                    {isMobile ? <MobileView /> : <DesktopView />}
                    
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-end md:items-center justify-center p-0 md:p-10 no-print">
                            <div className="bg-white w-full max-w-xl rounded-t-[40px] md:rounded-[40px] p-8 md:p-10 animate-in slide-in-from-bottom duration-300 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-xl font-black text-slate-900">Catat Transaksi</h2>
                                    <button onClick={() => setShowAddModal(false)} className="p-3 bg-slate-100 rounded-2xl"><lucide.X size={20} /></button>
                                </div>
                                <form onSubmit={handleAddTransaction} className="space-y-6">
                                    <div className="grid grid-cols-2 gap-3">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income', category: ''})}
                                            className={`py-4 rounded-2xl font-black text-xs border-2 transition-all ${formData.type === 'income' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'border-slate-100 text-slate-400'}`}>MASUK</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense', category: ''})}
                                            className={`py-4 rounded-2xl font-black text-xs border-2 transition-all ${formData.type === 'expense' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'border-slate-100 text-slate-400'}`}>KELUAR</button>
                                    </div>
                                    <input type="number" required placeholder="0" className="w-full text-4xl font-black p-8 bg-slate-50 rounded-[32px] outline-none border-2 border-transparent focus:border-blue-500 transition-all text-center"
                                        value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm"
                                            value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                            {categories.filter(c => c.type === formData.type).map(cat => (
                                                <option key={cat.id} value={cat.name}>{cat.name}</option>
                                            ))}
                                        </select>
                                        <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm"
                                            value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <input type="text" required placeholder="Catatan transaksi..." className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm"
                                        value={formData.note} onChange={(e) => setFormData({...formData, note: e.target.value})} />
                                    <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-[28px] font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all uppercase tracking-widest">SIMPAN KAS</button>
                                </form>
                            </div>
                        </div>
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
