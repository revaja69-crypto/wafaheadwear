<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow UMKM Pro - Cloud Sync</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-container { display: block !important; }
            .card { border: 1px solid #eee !important; box-shadow: none !important; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Helper Icons (SVG) ---
        // Dibungkus dengan fragment <>...</> untuk menghindari Adjacent JSX error
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                dashboard: (
                    <>
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </>
                ),
                wallet: (
                    <>
                        <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/>
                        <path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/>
                        <path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/>
                    </>
                ),
                history: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </>
                ),
                reports: (
                    <>
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </>
                ),
                settings: (
                    <>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </>
                ),
                plus: (
                    <>
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </>
                ),
                trash: (
                    <>
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>
                    </>
                ),
                printer: (
                    <>
                        <polyline points="6 9 6 2 18 2 18 9"/>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                        <rect x="6" y="14" width="12" height="8"/>
                    </>
                ),
                income: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="16 12 12 8 8 12"/>
                        <line x1="12" y1="16" x2="12" y2="8"/>
                    </>
                ),
                expense: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="8 12 12 16 16 12"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                    </>
                ),
                cloud: (
                    <path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.614-1.826-4.802-4.288-5.362C17.933 4.417 14.767 2 11 2 7.82 2 5.068 3.738 3.61 6.307 1.564 7.025 0 9.074 0 11.5 0 14.537 2.463 17 5.5 17H17.5z"/>
                ),
                x: (
                    <>
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </>
                )
            };
            return (
                <svg 
                    viewBox="0 0 24 24" 
                    width={size} 
                    height={size} 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [user] = useState({ uid: 'user-' + Math.random().toString(36).substr(2, 9) });
            const [transactions, setTransactions] = useState([]);
            const [categories, setCategories] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [showAddModal, setShowAddModal] = useState(false);
            const [formData, setFormData] = useState({
                amount: '',
                type: 'income',
                category: '',
                note: '',
                date: new Date().toISOString().split('T')[0]
            });

            const [newCatName, setNewCatName] = useState('');
            const [newCatType, setNewCatType] = useState('expense');

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                
                const savedTrans = localStorage.getItem('umkm_transactions');
                const savedCats = localStorage.getItem('umkm_categories');
                
                if (savedTrans) setTransactions(JSON.parse(savedTrans));
                if (savedCats) {
                    setCategories(JSON.parse(savedCats));
                } else {
                    const defaults = [
                        { id: '1', name: 'Penjualan', type: 'income' },
                        { id: '2', name: 'Modal', type: 'income' },
                        { id: '3', name: 'Belanja Stok', type: 'expense' },
                        { id: '4', name: 'Gaji', type: 'expense' },
                        { id: '5', name: 'Operasional', type: 'expense' },
                        { id: '6', name: 'Lainnya', type: 'expense' }
                    ];
                    setCategories(defaults);
                }
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                localStorage.setItem('umkm_transactions', JSON.stringify(transactions));
                localStorage.setItem('umkm_categories', JSON.stringify(categories));
            }, [transactions, categories]);

            useEffect(() => {
                const filtered = categories.filter(c => c.type === formData.type);
                if (filtered.length > 0 && !formData.category) {
                    setFormData(prev => ({ ...prev, category: filtered[0].name }));
                }
            }, [formData.type, categories, showAddModal]);

            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
                return { income, expense, balance: income - expense };
            }, [transactions]);

            const formatIDR = (amount) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.note) return;
                setTransactions([{ ...formData, id: Date.now().toString(), amount: Number(formData.amount) }, ...transactions]);
                setShowAddModal(false);
                setFormData({ amount: '', type: 'income', category: '', note: '', date: new Date().toISOString().split('T')[0] });
            };

            const deleteTransaction = (id) => setTransactions(transactions.filter(t => t.id !== id));

            const handleAddCategory = (e) => {
                e.preventDefault();
                if (!newCatName) return;
                setCategories([...categories, { id: Date.now().toString(), name: newCatName, type: newCatType }]);
                setNewCatName('');
            };

            const deleteCategory = (id) => setCategories(categories.filter(c => c.id !== id));

            const TransactionItem = ({ item }) => (
                <div className="flex items-center justify-between p-4 bg-white hover:bg-slate-50 border-b border-slate-50 transition-all group">
                    <div className="flex items-center gap-4">
                        <div className={`p-3 rounded-2xl ${item.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                            <Icon name={item.type === 'income' ? 'income' : 'expense'} size={20} />
                        </div>
                        <div>
                            <p className="font-bold text-slate-800 text-sm leading-tight">{item.note}</p>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">{item.date}</span>
                                <span className="text-[10px] text-slate-200 font-bold">•</span>
                                <span className="bg-slate-100 text-slate-500 text-[9px] px-2 py-0.5 rounded font-bold uppercase">{item.category}</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <p className={`font-black text-sm ${item.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>
                            {item.type === 'income' ? '+' : '-'} {formatIDR(item.amount)}
                        </p>
                        <button onClick={() => deleteTransaction(item.id)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500 transition-all no-print">
                            <Icon name="trash" size={16} />
                        </button>
                    </div>
                </div>
            );

            // Desktop View
            const DesktopView = () => (
                <div className="flex min-h-screen">
                    <aside className="w-72 bg-white border-r border-slate-200 p-8 flex flex-col gap-10 no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg shadow-blue-100">
                                <Icon name="wallet" size={24} />
                            </div>
                            <h1 className="text-xl font-black text-slate-900 leading-none">CASHFLOW <span className="block text-[9px] text-blue-500 tracking-[0.3em] mt-1">UMKM PRO</span></h1>
                        </div>
                        <nav className="flex flex-col gap-2 flex-1">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name="dashboard" /> Dashboard</button>
                            <button onClick={() => setActiveTab('reports')} className={`flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === 'reports' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name="reports" /> Analisis</button>
                            <button onClick={() => setActiveTab('history')} className={`flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === 'history' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name="history" /> Riwayat</button>
                            <button onClick={() => setActiveTab('settings')} className={`flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === 'settings' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name="settings" /> Pengaturan</button>
                        </nav>
                        <div className="mt-auto space-y-4">
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2">SINKRONISASI</p>
                                <div className="flex items-center gap-2 text-emerald-600 font-bold text-xs"><Icon name="cloud" size={14}/> ONLINE & AKTIF</div>
                            </div>
                            <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl bg-slate-900 text-white font-bold text-sm hover:bg-black transition-all"><Icon name="printer" size={18} /> CETAK PDF</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-12 overflow-y-auto max-h-screen">
                        <header className="flex justify-between items-center mb-10 no-print">
                            <h2 className="text-3xl font-black text-slate-900 capitalize">{activeTab}</h2>
                            <button onClick={() => setShowAddModal(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-3 shadow-xl shadow-blue-200 transition-all active:scale-95"><Icon name="plus" size={22} /> TRANSAKSI BARU</button>
                        </header>
                        <div className="fade-in">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-10">
                                    <div className="grid grid-cols-3 gap-8">
                                        <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between">
                                            <div><p className="text-xs font-black text-slate-400 uppercase mb-2">Saldo</p><h3 className="text-2xl font-black text-blue-600">{formatIDR(stats.balance)}</h3></div>
                                            <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl no-print"><Icon name="wallet" size={24}/></div>
                                        </div>
                                        <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between">
                                            <div><p className="text-xs font-black text-slate-400 uppercase mb-2">Masuk</p><h3 className="text-2xl font-black text-emerald-600">{formatIDR(stats.income)}</h3></div>
                                            <div className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl no-print"><Icon name="income" size={24}/></div>
                                        </div>
                                        <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between">
                                            <div><p className="text-xs font-black text-slate-400 uppercase mb-2">Keluar</p><h3 className="text-2xl font-black text-rose-600">{formatIDR(stats.expense)}</h3></div>
                                            <div className="p-4 bg-rose-50 text-rose-600 rounded-2xl no-print"><Icon name="expense" size={24}/></div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[40px] shadow-sm border border-slate-100 card">
                                        <h3 className="font-black text-xl mb-8">Data Terbaru</h3>
                                        <div className="space-y-1">
                                            {transactions.slice(0, 8).map(t => <TransactionItem key={t.id} item={t} />)}
                                            {transactions.length === 0 && <div className="p-10 text-center text-slate-400 italic">Belum ada transaksi</div>}
                                        </div>
                                    </div>
                                </div>
                            )}
                            {activeTab === 'settings' && (
                                <div className="grid grid-cols-2 gap-10">
                                    <div className="bg-white p-10 rounded-[40px] border border-slate-100 shadow-sm">
                                        <h3 className="text-xl font-black mb-6">Kelola Kategori</h3>
                                        <form onSubmit={handleAddCategory} className="flex gap-2 mb-8">
                                            <input type="text" placeholder="Kategori baru..." required value={newCatName} onChange={(e) => setNewCatName(e.target.value)} className="flex-1 p-4 bg-slate-50 rounded-xl outline-none font-bold text-sm" />
                                            <select value={newCatType} onChange={(e) => setNewCatType(e.target.value)} className="p-4 bg-slate-50 rounded-xl outline-none font-bold text-sm"><option value="expense">Keluar</option><option value="income">Masuk</option></select>
                                            <button type="submit" className="p-4 bg-blue-600 text-white rounded-xl shadow-lg hover:bg-blue-700 transition-all"><Icon name="plus" size={20}/></button>
                                        </form>
                                        <div className="space-y-2">
                                            {categories.map(cat => (
                                                <div key={cat.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                                    <span className={`text-xs font-black uppercase tracking-widest ${cat.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>{cat.name}</span>
                                                    <button onClick={() => deleteCategory(cat.id)} className="text-slate-300 hover:text-rose-500"><Icon name="trash" size={16}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                            {activeTab === 'reports' && (
                                <div className="bg-white p-12 rounded-[48px] shadow-sm border border-slate-100 card text-center">
                                    <h3 className="text-2xl font-black mb-6">Laporan Kategori</h3>
                                    <div className="max-w-md mx-auto space-y-4">
                                        {categories.map((cat, i) => {
                                            const total = transactions.filter(t => t.category === cat.name).reduce((acc, curr) => acc + Number(curr.amount), 0);
                                            return (
                                                <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                                    <span className="font-bold text-slate-700">{cat.name}</span>
                                                    <span className={`font-black ${cat.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>{formatIDR(total)}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            {activeTab === 'history' && (
                                <div className="bg-white rounded-[40px] shadow-sm border border-slate-100 p-8 card">
                                    <h3 className="font-black text-2xl mb-8">Arsip Transaksi</h3>
                                    <div className="space-y-1">
                                        {transactions.map(t => <TransactionItem key={t.id} item={t} />)}
                                        {transactions.length === 0 && <div className="p-20 text-center text-slate-300 italic">Kosong</div>}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );

            // Mobile View
            const MobileView = () => (
                <div className="min-h-screen bg-slate-50 pb-32 no-print">
                    <header className="bg-blue-600 text-white px-6 pt-10 pb-20 rounded-b-[48px] shadow-2xl relative">
                        <div className="flex justify-between items-center mb-6">
                            <span className="text-[10px] font-black tracking-widest uppercase opacity-70">UMKM CASHFLOW</span>
                            <div className="flex items-center gap-2 px-3 py-1 bg-white/10 rounded-full text-[9px] font-black"><Icon name="cloud" size={10} /> CLOUD</div>
                        </div>
                        <div className="text-center">
                            <p className="text-blue-200 text-[10px] font-black uppercase tracking-[0.3em] mb-1">Saldo Bisnis</p>
                            <h2 className="text-4xl font-black tracking-tighter">{formatIDR(stats.balance)}</h2>
                        </div>
                    </header>
                    <main className="px-6 -mt-10 relative z-10 fade-in">
                        <div className="bg-white rounded-[40px] p-6 shadow-sm min-h-[50vh]">
                            <h3 className="text-lg font-black mb-6 border-b border-slate-50 pb-4 capitalize">{activeTab}</h3>
                            {activeTab === 'dashboard' && transactions.slice(0, 15).map(t => <TransactionItem key={t.id} item={t} />)}
                            {activeTab === 'history' && transactions.map(t => <TransactionItem key={t.id} item={t} />)}
                            {activeTab === 'settings' && (
                                <div className="space-y-4">
                                    <form onSubmit={handleAddCategory} className="space-y-2">
                                        <input type="text" placeholder="Kategori" required value={newCatName} onChange={(e) => setNewCatName(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" />
                                        <div className="flex gap-2">
                                            <select value={newCatType} onChange={(e) => setNewCatType(e.target.value)} className="flex-1 p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm"><option value="expense">Keluar</option><option value="income">Masuk</option></select>
                                            <button type="submit" className="px-6 bg-blue-600 text-white rounded-2xl"><Icon name="plus" size={20}/></button>
                                        </div>
                                    </form>
                                    <div className="space-y-2 pt-4">
                                        {categories.map(cat => (
                                            <div key={cat.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                                                <span className="text-[10px] font-black uppercase text-slate-600">{cat.name}</span>
                                                <button onClick={() => deleteCategory(cat.id)} className="text-slate-300"><Icon name="trash" size={14}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {activeTab === 'reports' && categories.map((cat, i) => {
                                const total = transactions.filter(t => t.category === cat.name).reduce((acc, curr) => acc + Number(curr.amount), 0);
                                return (
                                    <div key={i} className="flex justify-between p-4 bg-slate-50 rounded-2xl text-xs font-bold mb-2">
                                        <span>{cat.name}</span><span className={cat.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}>{formatIDR(total)}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                    <nav className="fixed bottom-6 left-6 right-6 bg-slate-900/95 backdrop-blur-xl rounded-[32px] flex justify-around items-center py-5 px-4 z-40 shadow-2xl no-print border border-white/10">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 ${activeTab === 'dashboard' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="dashboard" size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Home</span></button>
                        <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center gap-1 ${activeTab === 'reports' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="reports" size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Report</span></button>
                        <div className="relative -top-10"><button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white w-16 h-16 rounded-[24px] flex items-center justify-center shadow-2xl border-4 border-slate-50 active:scale-90 transition-transform"><Icon name="plus" size={32} /></button></div>
                        <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 ${activeTab === 'history' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="history" size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Arsip</span></button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 ${activeTab === 'settings' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="settings" size={20} /><span className="text-[7px] font-black uppercase tracking-widest">Atur</span></button>
                    </nav>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {isMobile ? <MobileView /> : <DesktopView />}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-end md:items-center justify-center p-0 md:p-10 no-print">
                            <div className="bg-white w-full max-w-xl rounded-t-[40px] md:rounded-[40px] p-8 md:p-10 animate-in slide-in-from-bottom duration-300 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-xl font-black text-slate-900">Catat Transaksi</h2>
                                    <button onClick={() => setShowAddModal(false)} className="p-3 bg-slate-100 rounded-2xl"><Icon name="x" size={20} /></button>
                                </div>
                                <form onSubmit={handleAddTransaction} className="space-y-6">
                                    <div className="grid grid-cols-2 gap-3">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income', category: ''})} className={`py-4 rounded-2xl font-black text-xs border-2 transition-all ${formData.type === 'income' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'border-slate-100 text-slate-400'}`}>MASUK</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense', category: ''})} className={`py-4 rounded-2xl font-black text-xs border-2 transition-all ${formData.type === 'expense' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'border-slate-100 text-slate-400'}`}>KELUAR</button>
                                    </div>
                                    <input type="number" required placeholder="0" className="w-full text-4xl font-black p-8 bg-slate-50 rounded-[32px] outline-none border-2 border-transparent focus:border-blue-500 transition-all text-center" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                            {categories.filter(c => c.type === formData.type).map(cat => (<option key={cat.id} value={cat.name}>{cat.name}</option>))}
                                        </select>
                                        <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <input type="text" required placeholder="Catatan transaksi..." className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm" value={formData.note} onChange={(e) => setFormData({...formData, note: e.target.value})} />
                                    <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-[28px] font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all uppercase tracking-widest">SIMPAN KAS</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
