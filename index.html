<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Cashflow UMKM Pro - Offline Ready</title>
    
    <!-- Manifest PWA (Embedded via Data URI) -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Cashflow UMKM Pro","short_name":"Cashflow","description":"Aplikasi pencatatan keuangan UMKM","start_url":".","display":"standalone","background_color":"#f8fafc","theme_color":"#2563eb","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2654/2654254.png","sizes":"512x512","type":"image/png"}]}'>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-container { display: block !important; }
            .card { border: 1px solid #eee !important; box-shadow: none !important; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Script PWA: Registrasi Service Worker Dinamis -->
    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'cashflow-umkm-v1';
                const ASSETS = [
                    './',
                    'index.html',
                    'https://cdn.tailwindcss.com',
                    'https://unpkg.com/react@18/umd/react.production.min.js',
                    'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
                    'https://unpkg.com/@babel/standalone/babel.min.js'
                ];

                self.addEventListener('install', (event) => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return cache.addAll(ASSETS);
                        })
                    );
                });

                self.addEventListener('fetch', (event) => {
                    event.respondWith(
                        caches.match(event.request).then((response) => {
                            return response || fetch(event.request);
                        })
                    );
                });
            `;

            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swUrl).then((reg) => {
                    console.log('Service Worker Registered');
                }).catch((err) => {
                    console.log('Service Worker Failed', err);
                });
            });
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Helper Icons (SVG) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                dashboard: (
                    <>
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </>
                ),
                wallet: (
                    <>
                        <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/>
                        <path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/>
                        <path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/>
                    </>
                ),
                history: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </>
                ),
                reports: (
                    <>
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </>
                ),
                settings: (
                    <>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </>
                ),
                plus: (
                    <>
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </>
                ),
                trash: (
                    <>
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>
                    </>
                ),
                printer: (
                    <>
                        <polyline points="6 9 6 2 18 2 18 9"/>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                        <rect x="6" y="14" width="12" height="8"/>
                    </>
                ),
                income: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="16 12 12 8 8 12"/>
                        <line x1="12" y1="16" x2="12" y2="8"/>
                    </>
                ),
                expense: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="8 12 12 16 16 12"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                    </>
                ),
                cloud: (
                    <path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.614-1.826-4.802-4.288-5.362C17.933 4.417 14.767 2 11 2 7.82 2 5.068 3.738 3.61 6.307 1.564 7.025 0 9.074 0 11.5 0 14.537 2.463 17 5.5 17H17.5z"/>
                ),
                x: (
                    <>
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </>
                ),
                trendingUp: (
                    <>
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                        <polyline points="17 6 23 6 23 12"/>
                    </>
                ),
                alertCircle: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </>
                )
            };
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [transactions, setTransactions] = useState([]);
            const [categories, setCategories] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showDeleteAllConfirm, setShowDeleteAllConfirm] = useState(false);
            const [formData, setFormData] = useState({ amount: '', type: 'income', category: '', note: '', date: new Date().toISOString().split('T')[0] });
            const [newCatName, setNewCatName] = useState('');
            const [newCatType, setNewCatType] = useState('expense');

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                const savedTrans = localStorage.getItem('umkm_transactions');
                const savedCats = localStorage.getItem('umkm_categories');
                if (savedTrans) setTransactions(JSON.parse(savedTrans));
                if (savedCats) setCategories(JSON.parse(savedCats));
                else setCategories([{ id: '1', name: 'Penjualan', type: 'income' }, { id: '2', name: 'Modal', type: 'income' }, { id: '3', name: 'Stok', type: 'expense' }, { id: '4', name: 'Gaji', type: 'expense' }, { id: '5', name: 'Operasional', type: 'expense' }, { id: '6', name: 'Lainnya', type: 'expense' }]);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                localStorage.setItem('umkm_transactions', JSON.stringify(transactions));
                localStorage.setItem('umkm_categories', JSON.stringify(categories));
            }, [transactions, categories]);

            useEffect(() => {
                const filtered = categories.filter(c => c.type === formData.type);
                if (filtered.length > 0 && (!formData.category || !filtered.some(f => f.name === formData.category))) {
                    setFormData(prev => ({ ...prev, category: filtered[0].name }));
                }
            }, [formData.type, categories, showAddModal]);

            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
                return { income, expense, balance: income - expense };
            }, [transactions]);

            const reportData = useMemo(() => {
                const months = [];
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(); d.setMonth(d.getMonth() - i);
                    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    const label = d.toLocaleString('id-ID', { month: 'short' });
                    months.push({ key, label, income: 0, expense: 0 });
                }
                transactions.forEach(t => {
                    const monthKey = t.date.substring(0, 7);
                    const found = months.find(m => m.key === monthKey);
                    if (found) { t.type === 'income' ? found.income += Number(t.amount) : found.expense += Number(t.amount); }
                });
                return months;
            }, [transactions]);

            const formatIDR = (amount) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.note) return;
                setTransactions([{ ...formData, id: Date.now().toString(), amount: Number(formData.amount) }, ...transactions]);
                setShowAddModal(false);
                setFormData({ ...formData, amount: '', note: '', date: new Date().toISOString().split('T')[0] });
            };

            const deleteTransaction = (id) => setTransactions(transactions.filter(t => t.id !== id));

            const handleDeleteAllData = () => {
                setTransactions([]);
                setShowDeleteAllConfirm(false);
            };

            const handleAddCategory = (e) => {
                e.preventDefault();
                if (!newCatName) return;
                setCategories([...categories, { id: Date.now().toString(), name: newCatName, type: newCatType }]);
                setNewCatName('');
            };

            const deleteCategory = (id) => setCategories(categories.filter(c => c.id !== id));

            const BarChart = ({ data }) => {
                const maxVal = Math.max(...data.map(d => Math.max(d.income, d.expense)), 1000);
                const height = 150; const width = 400; const barWidth = 12; const gap = 45;
                return (
                    <svg viewBox={`0 0 ${width} ${height + 30}`} className="w-full h-auto">
                        {data.map((d, i) => {
                            const incH = (d.income / maxVal) * height; const expH = (d.expense / maxVal) * height;
                            const x = i * (barWidth * 2 + gap) + 30;
                            return (
                                <g key={i}>
                                    <rect x={x} y={height - incH} width={barWidth} height={incH} fill="#10b981" rx="3" />
                                    <rect x={x + barWidth + 4} y={height - expH} width={barWidth} height={expH} fill="#ef4444" rx="3" />
                                    <text x={x + barWidth} y={height + 20} textAnchor="middle" fontSize="10" fill="#94a3b8" fontWeight="bold">{d.label}</text>
                                </g>
                            );
                        })}
                        <line x1="0" y1={height} x2={width} y2={height} stroke="#f1f5f9" strokeWidth="2" />
                    </svg>
                );
            };

            const AnalysisSummary = () => {
                const total = stats.income + stats.expense || 1;
                const incP = Math.round((stats.income / total) * 100);
                const expP = 100 - incP;
                const margin = stats.income > 0 ? Math.round(((stats.income - stats.expense) / stats.income) * 100) : 0;
                return (
                    <div className="space-y-6">
                        <div className="space-y-3">
                            <div className="flex justify-between items-end"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pemasukan</p><span className="text-xs font-black text-emerald-600">{incP}%</span></div>
                            <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-emerald-500 transition-all duration-700" style={{ width: `${incP}%` }}></div></div>
                        </div>
                        <div className="space-y-3">
                            <div className="flex justify-between items-end"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pengeluaran</p><span className="text-xs font-black text-rose-600">{expP}%</span></div>
                            <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-rose-500 transition-all duration-700" style={{ width: `${expP}%` }}></div></div>
                        </div>
                        <div className="pt-4 border-t border-slate-50">
                            <div className={`p-4 rounded-2xl flex items-center gap-3 ${margin >= 0 ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}`}>
                                <Icon name="trendingUp" size={20} />
                                <div><p className="text-[10px] font-black uppercase opacity-70">Margin Laba</p><p className="text-sm font-black">{margin}% dari omzet</p></div>
                            </div>
                        </div>
                    </div>
                );
            };

            const TransactionItem = ({ item }) => (
                <div className="flex items-center justify-between p-4 bg-white hover:bg-slate-50 border-b border-slate-50 transition-all group">
                    <div className="flex items-center gap-4">
                        <div className={`p-3 rounded-2xl ${item.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}><Icon name={item.type === 'income' ? 'income' : 'expense'} /></div>
                        <div><p className="font-bold text-slate-800 text-sm">{item.note}</p><p className="text-[9px] font-bold text-slate-400 uppercase">{item.date} • {item.category}</p></div>
                    </div>
                    <div className="flex items-center gap-3">
                        <p className={`font-black text-sm ${item.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>{item.type === 'income' ? '+' : '-'} {formatIDR(item.amount)}</p>
                        <button onClick={() => deleteTransaction(item.id)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500 no-print"><Icon name="trash" size={16} /></button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* DESKTOP */}
                    {!isMobile && (
                        <div className="flex min-h-screen">
                            <aside className="w-72 bg-white border-r border-slate-200 p-8 flex flex-col gap-8 no-print">
                                <div className="flex items-center gap-3"><div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg"><Icon name="wallet" /></div><h1 className="text-xl font-black">CASHFLOW</h1></div>
                                <nav className="flex flex-col gap-2 flex-1">
                                    {['dashboard', 'reports', 'history', 'settings'].map(t => (
                                        <button key={t} onClick={() => setActiveTab(t)} className={`flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === t ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name={t} /> {t.charAt(0).toUpperCase() + t.slice(1)}</button>
                                    ))}
                                </nav>
                                <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl bg-slate-900 text-white font-bold text-sm"><Icon name="printer" /> CETAK PDF</button>
                            </aside>
                            <main className="flex-1 p-12 overflow-y-auto">
                                <header className="flex justify-between items-center mb-10 no-print">
                                    <h2 className="text-3xl font-black capitalize">{activeTab === 'dashboard' ? 'Overview' : activeTab}</h2>
                                    <button onClick={() => setShowAddModal(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black flex items-center gap-3 shadow-xl transition-all"><Icon name="plus" /> CATAT BARU</button>
                                </header>
                                <div className="fade-in">
                                    {activeTab === 'dashboard' && (
                                        <div className="space-y-8">
                                            <div className="grid grid-cols-3 gap-6">
                                                <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between"><div><p className="text-xs font-black text-slate-400 mb-1 uppercase">Saldo</p><h3 className="text-2xl font-black text-blue-600">{formatIDR(stats.balance)}</h3></div><div className="p-4 bg-blue-50 text-blue-600 rounded-2xl no-print"><Icon name="wallet" /></div></div>
                                                <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between"><div><p className="text-xs font-black text-slate-400 mb-1 uppercase">Masuk</p><h3 className="text-2xl font-black text-emerald-600">{formatIDR(stats.income)}</h3></div><div className="p-4 bg-emerald-50 text-emerald-600 rounded-2xl no-print"><Icon name="income" /></div></div>
                                                <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm card flex items-center justify-between"><div><p className="text-xs font-black text-slate-400 mb-1 uppercase">Keluar</p><h3 className="text-2xl font-black text-rose-600">{formatIDR(stats.expense)}</h3></div><div className="p-4 bg-rose-50 text-rose-600 rounded-2xl no-print"><Icon name="expense" /></div></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-8">
                                                <div className="bg-white p-10 rounded-[40px] shadow-sm border border-slate-100 card"><h3 className="font-black text-xl mb-8">Tren Kas</h3><BarChart data={reportData} /></div>
                                                <div className="bg-white p-10 rounded-[40px] shadow-sm border border-slate-100 card"><h3 className="font-black text-xl mb-8">Analisis Arus</h3><AnalysisSummary /></div>
                                            </div>
                                        </div>
                                    )}
                                    {activeTab === 'reports' && (
                                        <div className="bg-white p-10 rounded-[40px] border border-slate-100"><h3 className="text-xl font-black mb-8 text-center">Rekap Kategori</h3><div className="max-w-md mx-auto space-y-3">{categories.map(c => { const val = transactions.filter(t => t.category === c.name).reduce((a, b) => a + Number(b.amount), 0); return (<div key={c.id} className="flex justify-between p-4 bg-slate-50 rounded-2xl font-bold"><span className="text-slate-600">{c.name}</span><span className={c.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}>{formatIDR(val)}</span></div>); })}</div></div>
                                    )}
                                    {activeTab === 'history' && (
                                        <div className="bg-white p-8 rounded-[40px] border border-slate-100"><h3 className="font-black text-xl mb-8">Riwayat Lengkap</h3><div className="space-y-1">{transactions.map(t => <TransactionItem key={t.id} item={t} />)}</div></div>
                                    )}
                                    {activeTab === 'settings' && (
                                        <div className="space-y-8 max-w-2xl mx-auto">
                                            <div className="bg-white p-10 rounded-[40px] border border-slate-100">
                                                <h3 className="text-xl font-black mb-6">Manajemen Kategori</h3>
                                                <form onSubmit={handleAddCategory} className="flex gap-2 mb-8"><input type="text" placeholder="Kategori..." required value={newCatName} onChange={(e) => setNewCatName(e.target.value)} className="flex-1 p-4 bg-slate-50 rounded-xl outline-none font-bold" /><select value={newCatType} onChange={(e) => setNewCatType(e.target.value)} className="p-4 bg-slate-50 rounded-xl outline-none font-bold"><option value="expense">Keluar</option><option value="income">Masuk</option></select><button type="submit" className="p-4 bg-blue-600 text-white rounded-xl"><Icon name="plus" /></button></form>
                                                <div className="space-y-2">{categories.map(c => (<div key={c.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-xl"><span className="font-black text-xs uppercase text-slate-600">{c.name} ({c.type})</span><button onClick={() => deleteCategory(c.id)} className="text-slate-300 hover:text-rose-500"><Icon name="trash" size={16}/></button></div>))}</div>
                                            </div>
                                            <div className="bg-rose-50 p-10 rounded-[40px] border border-rose-100">
                                                <h3 className="text-xl font-black text-rose-900 mb-4">Zona Bahaya</h3>
                                                <p className="text-sm text-rose-600 mb-6 font-medium">Tindakan ini akan menghapus seluruh catatan transaksi yang tersimpan di perangkat ini secara permanen.</p>
                                                <button 
                                                    onClick={() => setShowDeleteAllConfirm(true)}
                                                    className="px-8 py-4 bg-rose-600 text-white rounded-2xl font-black hover:bg-rose-700 transition-all shadow-lg shadow-rose-200"
                                                >
                                                    HAPUS SELURUH DATA
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </main>
                        </div>
                    )}

                    {/* MOBILE */}
                    {isMobile && (
                        <div className="min-h-screen pb-32">
                            <header className="bg-blue-600 text-white px-6 pt-10 pb-20 rounded-b-[48px] shadow-2xl relative no-print">
                                <div className="flex justify-between items-center mb-6 opacity-70"><span className="text-[10px] font-black uppercase tracking-widest">CASHFLOW</span><Icon name="cloud" size={12} /></div>
                                <div className="text-center"><p className="text-blue-200 text-[10px] font-black uppercase tracking-[0.3em] mb-1">Saldo Bisnis</p><h2 className="text-4xl font-black tracking-tighter">{formatIDR(stats.balance)}</h2></div>
                            </header>
                            <main className="px-6 -mt-10 relative z-10 fade-in">
                                <div className="bg-white rounded-[40px] p-8 shadow-xl min-h-[50vh]">
                                    <h3 className="text-lg font-black mb-8 border-b border-slate-50 pb-4 capitalize">{activeTab === 'dashboard' ? 'Ringkasan Arus Kas' : activeTab}</h3>
                                    {activeTab === 'dashboard' && <AnalysisSummary />}
                                    {activeTab === 'history' && transactions.map(t => <TransactionItem key={t.id} item={t} />)}
                                    {activeTab === 'reports' && categories.map(c => { const val = transactions.filter(t => t.category === c.name).reduce((a, b) => a + Number(b.amount), 0); return (<div key={c.id} className="flex justify-between p-4 bg-slate-50 rounded-2xl text-xs font-bold mb-2"><span>{c.name}</span><span className={c.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}>{formatIDR(val)}</span></div>); })}
                                    {activeTab === 'settings' && (
                                        <div className="space-y-6">
                                            <div className="space-y-4">
                                                <h4 className="text-sm font-black text-slate-400 uppercase tracking-widest">Atur Kategori</h4>
                                                <form onSubmit={handleAddCategory} className="space-y-2"><input type="text" placeholder="Kategori" required value={newCatName} onChange={(e) => setNewCatName(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" /><div className="flex gap-2"><select value={newCatType} onChange={(e) => setNewCatType(e.target.value)} className="flex-1 p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm"><option value="expense">Keluar</option><option value="income">Masuk</option></select><button type="submit" className="px-6 bg-blue-600 text-white rounded-2xl"><Icon name="plus" /></button></div></form>
                                                <div className="space-y-2">{categories.map(c => (<div key={c.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl"><span className="text-[10px] font-black text-slate-600 uppercase">{c.name}</span><button onClick={() => deleteCategory(c.id)} className="text-slate-300"><Icon name="trash" size={14}/></button></div>))}</div>
                                            </div>
                                            <div className="pt-8 border-t border-slate-100">
                                                <h4 className="text-sm font-black text-rose-600 uppercase tracking-widest mb-3">Zona Bahaya</h4>
                                                <button 
                                                    onClick={() => setShowDeleteAllConfirm(true)}
                                                    className="w-full py-4 bg-rose-50 text-rose-600 border-2 border-rose-100 rounded-2xl font-black text-xs"
                                                >
                                                    HAPUS SEMUA DATA TRANSAKSI
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </main>
                            <nav className="fixed bottom-6 left-6 right-6 bg-slate-900/95 backdrop-blur-xl rounded-[32px] flex justify-around items-center py-5 px-4 z-40 shadow-2xl no-print border border-white/10">
                                <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 ${activeTab === 'dashboard' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="dashboard" /><span className="text-[7px] font-black uppercase">Home</span></button>
                                <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center gap-1 ${activeTab === 'reports' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="reports" /><span className="text-[7px] font-black uppercase">Report</span></button>
                                <div className="relative -top-10"><button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white w-16 h-16 rounded-[24px] flex items-center justify-center shadow-2xl border-4 border-slate-50 active:scale-90 transition-transform"><Icon name="plus" size={32} /></button></div>
                                <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 ${activeTab === 'history' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="history" /><span className="text-[7px] font-black uppercase">Arsip</span></button>
                                <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 ${activeTab === 'settings' ? 'text-blue-400' : 'text-slate-500'}`}><Icon name="settings" /><span className="text-[7px] font-black uppercase">Atur</span></button>
                            </nav>
                        </div>
                    )}

                    {/* MODAL INPUT TRANSAKSI */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-end md:items-center justify-center p-0 md:p-10 no-print">
                            <div className="bg-white w-full max-w-xl rounded-t-[40px] md:rounded-[40px] p-8 md:p-10 animate-in slide-in-from-bottom shadow-2xl overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-10"><h2 className="text-xl font-black">Catat Kas</h2><button onClick={() => setShowAddModal(false)} className="p-3 bg-slate-100 rounded-2xl"><Icon name="x" /></button></div>
                                <form onSubmit={handleAddTransaction} className="space-y-6">
                                    <div className="grid grid-cols-2 gap-3">
                                        <button type="button" onClick={() => setFormData({...formData, type: 'income', category: ''})} className={`py-4 rounded-2xl font-black text-xs border-2 transition-all ${formData.type === 'income' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'border-slate-100 text-slate-400'}`}>MASUK</button>
                                        <button type="button" onClick={() => setFormData({...formData, type: 'expense', category: ''})} className={`py-4 rounded-2xl font-black text-xs border-2 transition-all ${formData.type === 'expense' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'border-slate-100 text-slate-400'}`}>KELUAR</button>
                                    </div>
                                    <input type="number" required placeholder="0" className="w-full text-4xl font-black p-8 bg-slate-50 rounded-[32px] outline-none border-2 border-transparent focus:border-blue-500 text-center" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})}>
                                            {categories.filter(c => c.type === formData.type).map(cat => (<option key={cat.id} value={cat.name}>{cat.name}</option>))}
                                        </select>
                                        <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <input type="text" required placeholder="Keterangan..." className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" value={formData.note} onChange={(e) => setFormData({...formData, note: e.target.value})} />
                                    <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-[28px] font-black text-lg active:scale-95 transition-all uppercase tracking-widest">SIMPAN KAS</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL KONFIRMASI HAPUS SEMUA */}
                    {showDeleteAllConfirm && (
                        <div className="fixed inset-0 bg-rose-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6 no-print">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl text-center animate-in zoom-in duration-300">
                                <div className="mx-auto w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mb-6">
                                    <Icon name="alertCircle" size={32} />
                                </div>
                                <h3 className="text-xl font-black text-slate-900 mb-2">Hapus Semua Data?</h3>
                                <p className="text-sm text-slate-500 mb-8 font-medium">Tindakan ini tidak dapat dibatalkan. Seluruh riwayat transaksi Anda akan hilang selamanya.</p>
                                <div className="space-y-3">
                                    <button 
                                        onClick={handleDeleteAllData}
                                        className="w-full py-4 bg-rose-600 text-white rounded-2xl font-black text-sm shadow-xl shadow-rose-200 active:scale-95 transition-all"
                                    >
                                        YA, HAPUS SEMUANYA
                                    </button>
                                    <button 
                                        onClick={() => setShowDeleteAllConfirm(false)}
                                        className="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-sm active:scale-95 transition-all"
                                    >
                                        BATALKAN
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
