<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Cashflow UMKM Pro</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- File CSS Terpisah -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Libraries (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const isLocalOrSecure = window.location.protocol === 'http:' || 
                                      window.location.protocol === 'https:' || 
                                      window.location.hostname === 'localhost';

                if (isLocalOrSecure) {
                    navigator.serviceWorker.register('sw.js')
                        .then(reg => console.log('SW terdaftar:', reg.scope))
                        .catch(err => console.warn('Pendaftaran SW dilewati (Sandbox):', err.message));
                }
            });
        }
    </script>

    <!-- File Logika Aplikasi (React/JSX) -->
    <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
